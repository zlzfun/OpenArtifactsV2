<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Artifacts</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗂️</text></svg>">
<style>
  :root {
    color-scheme: light dark;
    --bg: #f3f5f7; --surface: #ffffff; --border: #dde3e9;
    --text: #1d2833; --muted: #5d6b7a; --accent: #3a6ea5;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #151a20; --surface: #1d242c; --border: #2c3540;
            --text: #dce3ea; --muted: #8494a4; --accent: #6d9fd4; }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  }
  main { max-width: 960px; margin: 0 auto; padding: 48px 24px; }
  h1 { font-size: 22px; margin: 0 0 24px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
  a.card {
    display: block; padding: 18px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px;
    text-decoration: none; color: inherit; transition: border-color .15s;
  }
  a.card:hover { border-color: var(--accent); }
  .card .head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .card .emoji { font-size: 22px; }
  .card .name { font-weight: 600; font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card .meta { font-size: 12.5px; color: var(--muted); }
  .empty { color: var(--muted); padding: 64px 0; text-align: center; }
</style>
</head>
<body>
<main>
  <h1>🗂️ 我的 Artifacts</h1>
  <div class="grid">__ITEMS__</div>
</main>
</body>
</html>
